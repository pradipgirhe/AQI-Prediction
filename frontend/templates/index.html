<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AQI Prediction Dashboard</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(to right, #e0f7fa, #80deea);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .container {
            max-width: 800px;
            margin-top: 50px;
            background: #ffffff;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0px 8px 20px rgba(0,0,0,0.2);
        }
        h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #00796b;
        }
        .form-label {
            font-weight: 600;
        }
        .btn-primary {
            width: 100%;
            background-color: #00796b;
            border: none;
        }
        .btn-primary:hover {
            background-color: #004d40;
        }
        .prediction {
            margin-top: 20px;
            font-size: 1.5rem;
            font-weight: bold;
            text-align: center;
        }
        .chart-container {
            margin-top: 30px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Air Quality Index (AQI) Predictor</h2>

    <form method="POST" action="/predict">
        <div class="row">
            <div class="col-md-6 mb-3">
                <label for="PM2.5" class="form-label">PM2.5</label>
                <input type="number" step="0.01" class="form-control" id="PM2.5" name="PM2.5" placeholder="Enter PM2.5 value" required>
            </div>
            <div class="col-md-6 mb-3">
                <label for="PM10" class="form-label">PM10</label>
                <input type="number" step="0.01" class="form-control" id="PM10" name="PM10" placeholder="Enter PM10 value" required>
            </div>
            <div class="col-md-6 mb-3">
                <label for="O3" class="form-label">O3</label>
                <input type="number" step="0.01" class="form-control" id="O3" name="O3" placeholder="Enter O3 value" required>
            </div>
            <div class="col-md-6 mb-3">
                <label for="NO2" class="form-label">NO2</label>
                <input type="number" step="0.01" class="form-control" id="NO2" name="NO2" placeholder="Enter NO2 value" required>
            </div>
            <div class="col-md-6 mb-3">
                <label for="SO2" class="form-label">SO2</label>
                <input type="number" step="0.01" class="form-control" id="SO2" name="SO2" placeholder="Enter SO2 value" required>
            </div>
            <div class="col-md-6 mb-3">
                <label for="CO" class="form-label">CO</label>
                <input type="number" step="0.01" class="form-control" id="CO" name="CO" placeholder="Enter CO value" required>
            </div>
        </div>
        <button type="submit" class="btn btn-primary">Predict AQI</button>
    </form>

    {% if prediction %}
        <div class="prediction" style="color: {{ color }};">
            Predicted AQI: {{ prediction | round(2) }}<br>
            Category: {{ category }}
        </div>
    {% endif %}

    {% if chart_data %}
        <div class="chart-container text-center">
            <h5>Pollutant Levels</h5>
            <img src="data:image/png;base64,{{ chart_data }}" class="img-fluid" alt="Pollutant Chart">
        </div>
    {% endif %}

    {% if trend_chart_data %}
        <div class="chart-container text-center">
            <h5>Historical AQI Trend</h5>
            <img src="data:image/png;base64,{{ trend_chart_data }}" class="img-fluid" alt="AQI Trend Chart">
        </div>
    {% endif %}

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
